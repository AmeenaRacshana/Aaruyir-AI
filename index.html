<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaruyir AI | Mental Health Companion</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=3.1">
</head>

<body>
    <div class="app-container chat-layout">
        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <div>
                    <h2>Aaruyir AI</h2>
                    <p>A safe space for you, {{ username }}</p>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <a href="/dashboard" class="nav-link dashboard-link">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>View Dashboard</span>
                    </a>
                    <a href="/logout" class="nav-link logout-link"
                        style="color: #ef4444; background: rgba(239, 68, 68, 0.1);">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Logout</span>
                    </a>
                </div>
            </div>

            <div id="chatbox" class="chatbox">
                <!-- Messages will appear here -->
                <div class="message bot">
                    <p>{{ welcome_msg }}</p>
                </div>
            </div>

            <div id="image-preview-container" class="image-preview-container" style="display: none;">
                <img id="image-preview" src="" alt="Preview">
                <button class="remove-image-btn" onclick="removeImage()">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="input-area-container">
                <div class="input-actions-row">
                    <!-- Hidden file input for images -->
                    <input type="file" id="image-upload" accept="image/*" style="display: none;"
                        onchange="handleImageSelection(event)">

                    <button type="button" class="premium-action-btn image-btn"
                        onclick="document.getElementById('image-upload').click()" title="Attach Image">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                            </path>
                        </svg>
                        <span>Upload Image</span>
                    </button>

                    <button type="button" id="mic-btn" class="premium-action-btn voice-btn" onclick="toggleRecording()"
                        title="Voice Message">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                        <span>Voice Note</span>
                    </button>

                    <button type="button" class="premium-action-btn face-scan-btn" onclick="openFaceScanModal()" title="Analyze Expression">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        <span>Face Scan</span>
                    </button>
                </div>

                <div class="input-area">
                    <input id="msg" type="text" placeholder="Type your message here..."
                        onkeypress="handleKeyPress(event)">

                    <button onclick="sendMessage()" class="send-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="face-scan-modal-overlay" id="faceScanModalOverlay">
        <div class="face-scan-modal">
            <h2 style="color: white; font-family: 'Outfit', sans-serif; margin-bottom: 5px;">Face Analysis</h2>
            <p style="color: #94a3b8; font-size: 0.95rem; margin-bottom: 20px;">Let Aaruyir AI read your expression and offer support.</p>
            
            <div class="camera-container">
                <video id="face-video" autoplay playsinline></video>
                <canvas id="face-canvas" style="display: none;"></canvas>
            </div>
            
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeFaceScanModal()">Cancel</button>
                <button class="btn-confirm" onclick="captureFaceAndAnalyze()">Capture & Analyze</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js?v=3.2"></script>
</body>

</html>
